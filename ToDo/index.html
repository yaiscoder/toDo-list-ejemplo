<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>To Do List</h1>
    </header>
    <main>
        <div class="card">
            <div>
                <form id="form">
                    <input type="text" class="form-input" id="txtTask" placeholder="Add task...">
                    <button class="btn" type="submit">Save</button>
                </form>
            </div>
            <div>
                <h3>Default</h3>
                <ul class="list list-default">
                    <li>Task 1</li>
                    <li>Task 1</li>
                    <li>Task 3</li>
                </ul>
            </div>
            <div>
                <h3>Pending</h3>
                <ul class="list list-pending">
                </ul>
            </div>
            <div>
                <h3>Done!!</h3>
                <ul class="list list-done"></ul>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
